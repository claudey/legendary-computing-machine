<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 1200px; height: 630px; overflow: hidden; background: #0e1116; }

  .root {
    width: 1200px; height: 630px;
    position: relative;
    overflow: hidden;
    font-family: 'IBM Plex Sans', 'Helvetica Neue', system-ui, sans-serif;
  }

  /* faint grid */
  .root::before {
    content: '';
    position: absolute; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* chart layer — full bleed */
  .chart-layer {
    position: absolute; inset: 0; z-index: 1;
  }

  /* gradient mask fades chart behind text area */
  .chart-layer::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to right,
      #0e1116 0%,
      #0e1116 38%,
      rgba(14,17,22,0.92) 52%,
      rgba(14,17,22,0.55) 64%,
      rgba(14,17,22,0.15) 78%,
      transparent 100%
    );
  }

  /* text content */
  .text {
    position: absolute;
    top: 0; left: 0;
    width: 792px; /* 66% */
    height: 100%;
    padding: 58px 64px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #ffb000;
  }
  .eyebrow-dot { width: 7px; height: 7px; border-radius: 50%; background: #ffb000; }

  .heading { display: flex; flex-direction: column; gap: 22px; }

  .title-lg {
    font-size: 68px;
    font-weight: 700;
    color: #e7edf3;
    letter-spacing: -0.035em;
    line-height: 1.0;
  }
  .title-lg em { font-style: normal; color: #4dd8e0; }

  .desc {
    font-size: 19px;
    font-weight: 400;
    color: #9aa7b4;
    line-height: 1.55;
    max-width: 520px;
  }

  .url {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: #4dd8e0;
    letter-spacing: 0.01em;
  }
</style>
</head>
